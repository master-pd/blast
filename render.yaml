version: 1
services:
  - type: web
    name: whatsmultiapi
    env: node
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: sessions
      mountPath: /app/sessions
      sizeGB: 2
    envVars:
      - key: PORT
        value: 10000
      - key: API_KEY
        sync: false   # Render dashboard-এ manually set করবে
